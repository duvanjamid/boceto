<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Boceto</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <!-- No-flash theme: apply before Angular boots to avoid flash -->
  <script>
    (function(){
      try {
        var s = localStorage.getItem('boceto-theme');
        if (s === 'dark' || s === 'light') { document.documentElement.setAttribute('data-shell', s); return; }
      } catch(e){}
      var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-shell', dark ? 'dark' : 'light');
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
